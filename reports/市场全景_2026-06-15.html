.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin:12px 0 20px}
.metric-card{background:#161b22;border-radius:8px;padding:10px 12px;text-align:center;cursor:pointer;transition:all .2s;border:1px solid transparent}
.metric-card:hover{border-color:#30363d;transform:translateY(-1px)}
.metric-card.active{border-color:#58a6ff;box-shadow:0 0 12px rgba(88,166,255,.15)}
.metric-label{font-size:11px;color:#8b949e;margin-bottom:2px}
.metric-value{font-size:20px;font-weight:700}
.metric-sub{font-size:10px;color:#8b949e;margin-top:1px}

.section h2{font-size:15px;color:#58a6ff;margin-bottom:10px;padding-left:8px;border-left:3px solid #58a6ff}

/* Sector heat map */
.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin:8px 0 16px}
.heat-cell{border-radius:6px;padding:8px 6px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.heat-cell:hover{transform:scale(1.05);z-index:1}
.heat-name{font-size:12px;font-weight:500;color:#f0f6fc}
.heat-val{font-size:16px;font-weight:700;margin-top:2px}

/* Sector tabs */
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
.tab{padding:6px 14px;border-radius:16px;font-size:12px;cursor:pointer;background:#161b22;color:#8b949e;border:1px solid #21262d;transition:all .2s;white-space:nowrap}
.tab:hover{border-color:#30363d;color:#c9d1d9}
.tab.active{background:#1a3a5c;color:#58a6ff;border-color:#58a6ff}
.tab.up-tab{border-color:#3d1f1f}.tab.down-tab{border-color:#1f3d1f}

/* Stock ranking tables */
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rank-panel{background:#161b22;border-radius:8px;overflow:hidden}
.rank-title{padding:8px 12px;font-size:12px;font-weight:600;border-bottom:1px solid #21262d}
.rank-title.gainers{color:#f85149;background:linear-gradient(90deg,#2d1215,transparent)}
.rank-title.losers{color:#3fb950;background:linear-gradient(90deg,#122117,transparent)}
.rank-table{width:100%;border-collapse:collapse;font-size:12px}
.rank-table th{padding:6px 10px;text-align:left;color:#484f58;font-weight:500;border-bottom:1px solid #21262d;font-size:11px}
.rank-table td{padding:5px 10px;border-bottom:1px solid #0d1117}
.rank-table tr:hover{background:#1a1e24}
.rank-num{color:#484f58;width:24px;text-align:center;font-size:11px}
.rank-code{color:#8b949e;font-size:11px}

/* Bar visualization */
.bar-row{display:flex;align-items:center;margin:3px 0;font-size:12px}
.bar-label{width:70px;text-align:right;padding-right:8px;color:#8b949e;flex-shrink:0;font-size:11px}
.bar-track{flex:1;height:16px;background:#161b22;border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;color:#fff;font-weight:500;min-width:40px;transition:width .6s ease}
.bar-fill.up-bar{background:linear-gradient(90deg,#b33a3a,#f85149)}
.bar-fill.down-bar{background:linear-gradient(90deg,#2ea043,#3fb950)}
.bar-fill.neutral-bar{background:#484f58}

/* Market sentiment */
.sentiment-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin:8px 0}
.sent-card{background:#161b22;border-radius:8px;padding:10px;text-align:center}
.sent-label{font-size:11px;color:#8b949e}
.sent-val{font-size:22px;font-weight:700;margin-top:2px}

/* AH compare */
.ah-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0}
.ah-card{background:#161b22;border-radius:8px;padding:12px}
.ah-title{font-size:12px;color:#8b949e;margin-bottom:6px}
.ah-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}

/* Insight box */
.insight{background:#1a1e24;border-radius:8px;padding:12px 16px;margin:12px 0;font-size:12px;color:#8b949e;border-left:3px solid #d29922}
.insight strong{color:#f0f6fc}

/* Risk box */
.risk-box{background:#161b22;border-radius:6px;padding:10px 14px;margin:6px 0;border-left:3px solid #f85149}
.risk-box h4{font-size:12px;color:#f85149;margin-bottom:2px}
.risk-box p{font-size:12px;color:#8b949e}

/* Footer */
footer{text-align:center;color:#484f58;font-size:11px;padding:20px 0 12px;border-top:1px solid #21262d;margin-top:20px}

/* Responsive */
@media(max-width:640px){
  .rank-grid{grid-template-columns:1fr}
  .ah-grid{grid-template-columns:1fr}
  .metric-grid{grid-template-columns:repeat(3,1fr)}
  .heatmap{grid-template-columns:repeat(3,1fr)}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}

function chgText(v){return (v>0?'+':'')+v.toFixed(2)+'%'}

function heatColor(v){
  if(v>=5) return 'rgba(248,81,73,.85)';

  if(v>=1) return 'rgba(248,81,73,.3)';

  if(v>=-1) return 'rgba(63,185,80,.2)';
  if(v>=-3) return 'rgba(63,185,80,.45)';
  return 'rgba(63,185,80,.75)';
}

}

    <div class="heat-cell" style="background:${heatColor(s.chg)}" data-sector="${s.name}">
      <div class="heat-name">${s.name}</div>
      <div class="heat-val" style="color:${chgColor(s.chg)}">${chgText(s.chg)}</div>
    </div>
  `).join('');
  el.querySelectorAll('.heat-cell').forEach(cell=>{
    cell.addEventListener('click',()=>{
      const name=cell.dataset.sector;
      if(sectorData[name]){
        activeSector=name;
        renderSectorTabs();
        renderSectorDetail();
      }
    });
  });
}

// Sector tabs
function renderSectorTabs(){
  const el=document.getElementById('sectorTabs');
  const sectors=Object.keys(sectorData);
  el.innerHTML=sectors.map(s=>{
    const d=sectorData[s];
    const c=chgClass(d.chg);
    const tc=d.chg>0?'up-tab':d.chg<0?'down-tab':'';
    return `<div class="tab ${s===activeSector?'active':''} ${tc}" data-sector="${s}">${s} <span class="${c}">${chgText(d.chg)}</span></div>`;
  }).join('');
  el.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      activeSector=tab.dataset.sector;
      renderSectorTabs();
      renderSectorDetail();
    });
  });
}

// Sector detail
function renderSectorDetail(){
  const el=document.getElementById('sectorDetail');
  const d=sectorData[activeSector];
  if(!d){el.innerHTML='<div style="color:#8b949e;padding:12px">暂无个股数据</div>';return}
  
  let html='<div class="rank-grid">';
  
  // Gainers
  html+='<div class="rank-panel"><div class="rank-title gainers">🔴 涨幅前10</div><table class="rank-table"><tr><th>#</th><th>名称</th><th>代码</th><th style="text-align:right">涨跌幅</th></tr>';
  d.tops.forEach((s,i)=>{
    html+=`<tr><td class="rank-num">${i+1}</td><td>${s.name}</td><td class="rank-code">${s.code}</td><td style="text-align:right" class="up">${chgText(s.chg)}</td></tr>`;
  });
  html+='</table></div>';
  
  // Losers
  html+='<div class="rank-panel"><div class="rank-title losers">🟢 跌幅前10</div><table class="rank-table"><tr><th>#</th><th>名称</th><th>代码</th><th style="text-align:right">涨跌幅</th></tr>';
  if(d.bots.length){
    d.bots.forEach((s,i)=>{
      html+=`<tr><td class="rank-num">${i+1}</td><td>${s.name}</td><td class="rank-code">${s.code}</td><td style="text-align:right" class="down">${chgText(s.chg)}</td></tr>`;
    });
  } else {
    html+='<tr><td colspan="4" style="text-align:center;color:#484f58;padding:20px">全线上涨，无跌股</td></tr>';
  }
  html+='</table></div>';
  
  html+='</div>';
  el.innerHTML=html;
  el.className='fade-in';
}

// Sentiment
function renderSentiment(){
  const el=document.getElementById('sentimentGrid');
  const items=[
    {label:'涨停家数',val:'164',color:'#f85149'},
    {label:'跌停家数',val:'12',color:'#3fb950'},
    {label:'涨跌比',val:'2.6:1',color:'#d29922'},
    {label:'成交额',val:'3.03万亿',color:'#58a6ff'},
    {label:'沪深300 PE分位',val:'83%',color:'#d29922'},
    {label:'中证500 PE分位',val:'63%',color:'#8b949e'}
  ];
  el.innerHTML=items.map(i=>`<div class="sent-card"><div class="sent-label">${i.label}</div><div class="sent-val" style="color:${i.color}">${i.val}</div></div>`).join('');
}

// AH compare

}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RJ Research Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0d;
  --surface: #111318;
  --surface-hover: #1a1d24;
  --border: #1e2128;
  --border-active: #3a3d44;
  --text: #d4d6db;
  --text-secondary: #7a7d85;
  --text-muted: #4e5159;
  --accent: #c8a95a;
  --accent-dim: #8a7136;
  --red: #d9534f;
  --green: #5cb85c;
  --radius: 6px;
  --font-serif: "Playfair Display", "Georgia", "Times New Roman", serif;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Nav ── */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0a0b0d;
  font-family: var(--font-serif);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -1px;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-text .brand {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 0.5px;
}

.logo-text .sub {
  font-size: 9px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.nav-right {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

/* ── Hero ── */
.hero {
  padding: 40px 24px 24px;
  max-width: 1100px;
  margin: 0 auto;
}

.hero h1 {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.hero p {
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 600px;
  line-height: 1.7;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 28px 0 0;
}

/* ── Tabs ── */
.tabs-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.tabs-wrap::-webkit-scrollbar { height: 0; }

.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  min-width: max-content;
}

.tab {
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: var(--font-sans);
}

.tab:hover {
  color: var(--text-secondary);
  border-bottom-color: var(--border-active);
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab .count {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
}

.tab.active .count {
  color: var(--accent-dim);
}

/* ── Content ── */
.content {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}

/* Controls */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.toolbar-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.date-select {
  padding: 8px 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  min-width: 150px;
  font-family: var(--font-sans);
  letter-spacing: 0.5px;
  -webkit-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%237a7d85' stroke-width='1.5'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
}

.date-select:focus {
  outline: none;
  border-color: var(--accent-dim);
}

.btn {
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-family: var(--font-sans);
  transition: all 0.15s;
}

.btn:hover {
  border-color: var(--accent-dim);
  color: var(--text);
}

.btn-nav {
  padding: 8px 12px;
  font-size: 14px;
}

/* Report frame */
.report-frame {
  border: 1px solid var(--border);
  background: #fff;
  min-height: 500px;
}

.report-frame iframe {
  width: 100%;
  height: 80vh;
  min-height: 500px;
  border: none;
  display: block;
}

/* Empty state */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  color: var(--text-muted);
  gap: 12px;
}

.empty .icon {
  font-size: 32px;
  opacity: 0.4;
}

.empty p {
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  padding: 28px 24px;
  max-width: 1100px;
  margin: 40px auto 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.footer-left {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.footer-right {
  font-size: 10px;
  color: var(--text-muted);
}

/* Loading */
.skeleton {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 40px 0;
}

.skeleton-line {
  height: 14px;
  background: var(--surface);
  border-radius: 3px;
  animation: pulse 1.5s ease-in-out infinite;
}

.skeleton-line:nth-child(2) { width: 70%; animation-delay: 0.1s; }
.skeleton-line:nth-child(3) { width: 85%; animation-delay: 0.2s; }
.skeleton-line:nth-child(4) { width: 50%; animation-delay: 0.3s; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Mobile */
@media (max-width: 768px) {
  .nav { padding: 0 16px; height: 48px; }
  .hero { padding: 28px 16px 16px; }
  .hero h1 { font-size: 22px; }
  .tabs-wrap { padding: 0 16px; }
  .tab { padding: 12px 14px; font-size: 12px; }
  .content { padding: 16px; }
  .toolbar { gap: 8px; }
  .report-frame iframe { height: 60vh; min-height: 400px; }
  .footer { padding: 20px 16px; }
}

@media (max-width: 480px) {
  .hero h1 { font-size: 19px; }
  .tab { padding: 10px 12px; font-size: 11px; }
}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="/">
    <div class="logo-mark">RJ</div>
    <div class="logo-text">
      <span class="brand">RJ Research Hub</span>
      <span class="sub">Investment Intelligence</span>
    </div>
  </a>
  <div class="nav-right" id="navStats"></div>
</nav>

<section class="hero">
  <h1>深度投研资讯</h1>
  <div class="divider"></div>
</section>

<div class="tabs-wrap" id="tabsWrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="content" id="mainContent">
  <div class="skeleton">
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-left">RJ Research Hub &copy; 2026</div>
  <div class="footer-right">Powered by Cleo &middot; Cloudflare Pages</div>
</footer>

<script>
(function() {
  var CAT_ICONS = {
    morning: '&#x2600;',
    evening: '&#x1F319;',
    national_team: '&#x1F1E8;&#x1F1F3;',
    ai_bubble: '&#x25CB;',
    ai_news: '&#x25C6;',
    deep_research: '&#x25A3;',
    ai_tracking: '&#x25A1;'
  };

  var CAT_NAMES_SHORT = {
    morning: '早间日报',
    evening: '晚间日报',
    national_team: '国家队',
    ai_bubble: 'AI 泡沫',
    ai_news: 'AI 新闻',
    deep_research: '深度研究',
    ai_tracking: '人物追踪'
  };

  var tabsEl = document.getElementById('tabs');
  var mainContent = document.getElementById('mainContent');
  var navStats = document.getElementById('navStats');
  var activeCat = null;
  var activeDate = null;

  function escapeHTML(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function setActiveTab(catId) {
    activeCat = catId;
    var allTabs = tabsEl.querySelectorAll('.tab');
    allTabs.forEach(function(t) {
      t.classList.toggle('active', t.dataset.catId === catId);
    });
  }

  function switchDate(date) {
    if (!activeCat) return;
    var cat = window.__MANIFEST.categories.find(function(c) { return c.id === activeCat; });
    if (!cat || !cat.files[date]) return;
    activeDate = date;
    var frame = document.getElementById('reportFrame');
    if (frame) {
      frame.innerHTML = '<iframe src="' + cat.files[date] + '" title="Report - ' + date + '"></iframe>';
    }
    var sel = document.getElementById('dateSelect');
    if (sel) sel.value = date;
    var link = document.getElementById('openLink');
    if (link) link.href = cat.files[date];
  }

  function navigateDate(dir) {
    if (!activeCat) return;
    var sel = document.getElementById('dateSelect');
    if (!sel) return;
    var idx = sel.selectedIndex + dir;
    if (idx >= 0 && idx < sel.options.length) {
      sel.selectedIndex = idx;
      switchDate(sel.value);
    }
  }

  window.switchDate = switchDate;
  window.navigateDate = navigateDate;

  function renderCategory(cat) {
    activeCat = cat.id;
    setActiveTab(cat.id);

    var dates = Object.keys(cat.files).sort().reverse();
    if (dates.length === 0) {
      mainContent.innerHTML =
        '<div class="empty"><span class="icon">&#x25A1;</span><p>暂无报告</p></div>';
      return;
    }

    activeDate = dates[0];

    var html = '<div class="toolbar">';
    html += '<span class="toolbar-label">日期</span>';
    html += '<select class="date-select" id="dateSelect" onchange="switchDate(this.value)">';
    dates.forEach(function(d) {
      html += '<option value="' + d + '"' + (d === activeDate ? ' selected' : '') + '>' + d + '</option>';
    });
    html += '</select>';
    html += '<button class="btn btn-nav" onclick="navigateDate(-1)">&#x25C0;</button>';
    html += '<button class="btn btn-nav" onclick="navigateDate(1)">&#x25B6;</button>';
    html += '<span style="flex:1"></span>';
    html += '<a class="btn" id="openLink" href="' + cat.files[activeDate] + '" target="_blank">在新窗口打开 &#x2197;</a>';
    html += '</div>';
    html += '<div class="report-frame" id="reportFrame">';
    html += '<iframe src="' + cat.files[activeDate] + '" title="' + escapeHTML(cat.name) + ' - ' + activeDate + '"></iframe>';
    html += '</div>';

    mainContent.innerHTML = html;
  }

  function renderTabs(manifest) {
    var html = '';
    manifest.categories.forEach(function(cat, idx) {
      var short = CAT_NAMES_SHORT[cat.id] || cat.name;
      var icon = CAT_ICONS[cat.id] || '';
      html += '<button class="tab' + (idx === 0 ? ' active' : '') + '" data-cat-id="' + cat.id + '" onclick="window.__loadCat(\'' + cat.id + '\')">';
      html += '<span>' + icon + '</span>';
      html += short;
      html += ' <span class="count">' + cat.reportCount + '</span>';
      html += '</button>';
    });
    tabsEl.innerHTML = html;
  }

  window.__loadCat = function(catId) {
    var cat = window.__MANIFEST.categories.find(function(c) { return c.id === catId; });
    if (cat) renderCategory(cat);
  };

  function render() {
    var m = window.__MANIFEST;
    if (!m || !m.categories || m.categories.length === 0) {
      mainContent.innerHTML = '<div class="empty"><span class="icon">&#x26A0;</span><p>暂无报告数据</p></div>';
      return;
    }

    var totalReports = m.categories.reduce(function(s, c) { return s + c.reportCount; }, 0);
    navStats.textContent = m.categories.length + ' Sections · ' + totalReports + ' Reports';

    renderTabs(m);
    renderCategory(m.categories[0]);
  }

  window.renderHub = render;
})();
</script>

<style>
:root {
  --bg: #FCFCF9;
  --surface: #F4F3EF;
  --surface-hover: #EDECE7;
  --border: #E2E1DC;
  --border-active: #C4C3BD;
  --text: #2A2A28;
  --text-secondary: #787772;
  --text-muted: #A5A49F;
  --accent: #7B8B82;
  --accent-hover: #69786F;
  --accent-light: #EBEFEC;
  --accent-text: #5C6B61;
  --red: #D16B5C;
  --green: #5A8F76;
  --radius: 6px;
  --radius-lg: 10px;
  --font-serif: "Playfair Display", Georgia, "Times New Roman", serif;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-rounded: "Nunito", "Cabin", "Varela Round", -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Nav ── */
.nav {
  background: #FFFFFF;
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
}

.logo-mark svg {
  display: block;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-text .brand {
  font-family: var(--font-rounded);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.2px;
}

.logo-text .sub {
  font-size: 9.5px;
  color: var(--text-muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-top: 1px;
}

.nav-right {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

/* ── Hero ── */
.hero {
  padding: 44px 28px 0;
  max-width: 1100px;
  margin: 0 auto;
}

.hero h1 {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}

.hero p {
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 520px;
  line-height: 1.7;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0 0;
}

/* ── Tabs ── */
.tabs-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 28px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.tabs-wrap::-webkit-scrollbar { height: 0; }

.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  min-width: max-content;
}

.tab {
  padding: 14px 24px 12px;
  font-size: 14.5px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s;
  letter-spacing: 0.2px;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: var(--font-sans);
  position: relative;
}

.tab:hover {
  color: var(--text-secondary);
  border-bottom-color: var(--border-active);
}

.tab.active {
  color: var(--accent-text);
  border-bottom-color: var(--accent);
}

.tab .count {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 4px;
}

.tab.active .count {
  color: var(--accent);
}

/* ── Content ── */
.content {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 28px;
}

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.toolbar-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.8px;
}

.date-select {
  padding: 7px 32px 7px 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: #FFFFFF;
  color: var(--text);
  cursor: pointer;
  min-width: 155px;
  font-family: var(--font-sans);
  letter-spacing: 0.3px;
  -webkit-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23787772' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  transition: border-color 0.15s;
}

.date-select:focus {
  outline: none;
  border-color: var(--accent);
}

.btn {
  padding: 7px 14px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: #FFFFFF;
  color: var(--text-secondary);
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.3px;
  font-family: var(--font-sans);
  transition: border-color 0.15s, color 0.15s;
}

.btn:hover {
  border-color: var(--accent);
  color: var(--accent-text);
}

.btn-nav {
  padding: 7px 10px;
  font-size: 13px;
  line-height: 1;
}

/* Report container - full content */
.report-container {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: #FFFFFF;
  min-height: 400px;
  overflow: hidden;
}

.report-container > .loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  color: var(--text-muted);
  gap: 16px;
}

.report-container > .loading .spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.report-container > .loading p {
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* Empty state */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  color: var(--text-muted);
  gap: 12px;
}

.empty .icon {
  opacity: 0.35;
}

.empty p {
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  padding: 28px 28px;
  max-width: 1100px;
  margin: 48px auto 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.footer-left {
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: 0.8px;
}

.footer-right {
  font-size: 10.5px;
  color: var(--text-muted);
}

/* Mobile */
@media (max-width: 768px) {
  .nav { padding: 0 16px; height: 52px; }
  .hero { padding: 32px 16px 0; }
  .hero h1 { font-size: 22px; }
  .tabs-wrap { padding: 0 16px; }
  .tab { padding: 12px 16px 10px; font-size: 13px; }
  .content { padding: 16px; }
  .toolbar { gap: 8px; }
  .report-container { min-height: 300px; }
  .footer { padding: 20px 16px; }
}

@media (max-width: 480px) {
  .hero h1 { font-size: 19px; }
  .tab { padding: 10px 14px 8px; font-size: 12px; }
}

/* Report container - shadow DOM isolation */
.report-container .report-body {
  padding: 16px 20px;
}

<script>
(function() {
  'use strict';

  var CAT_NAMES_SHORT = {
    morning: '早间日报',
    evening: '晚间日报',
    national_team: '国家队',
    ai_bubble: 'AI 泡沫',
    ai_news: 'AI 新闻',
    deep_research: '深度研究',
    ai_tracking: '人物追踪',
    market_panorama: '市场全景'
  };

  var tabsEl = document.getElementById('tabs');
  var mainContent = document.getElementById('mainContent');
  var navStats = document.getElementById('navStats');
  var activeCat = null;
  var activeKey = null;

  function escapeHTML(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function setActiveTab(catId) {
    activeCat = catId;
    var allTabs = tabsEl.querySelectorAll('.tab');
    allTabs.forEach(function(t) {
      t.classList.toggle('active', t.dataset.catId === catId);
    });
  }

  function showLoading() {
    mainContent.innerHTML =
      '<div class="toolbar"></div>' +
      '<div class="report-container"><div class="loading"><div class="spinner"></div><p>正在加载报告…</p></div></div>';
  }

  function showToolbar(cat, keys) {
    if (keys.length === 0) return '<div class="toolbar"></div>';

    activeKey = keys[0];

    var html = '<div class="toolbar">';
    html += '<span class="toolbar-label">选择</span>';
    html += '<select class="date-select" id="reportSelect">';
    keys.forEach(function(k) {
      html += '<option value="' + escapeHTML(k) + '"' + (k === activeKey ? ' selected' : '') + '>' + escapeHTML(k) + '</option>';
    });
    html += '</select>';
    html += '<button class="btn btn-nav" id="navPrev" title="上一条">&#x25C0;</button>';
    html += '<button class="btn btn-nav" id="navNext" title="下一条">&#x25B6;</button>';
    html += '<span style="flex:1"></span>';
    html += '<a class="btn" id="openLink" href="' + escapeHTML(cat.files[activeKey]) + '" target="_blank">新窗口打开 ↗</a>';
    html += '</div>';

    return html;
  }

  function renderReportContent(cat, key) {
    activeKey = key;
    var sel = document.getElementById('reportSelect');
    if (sel) sel.value = key;

    var link = document.getElementById('openLink');
    if (link) link.href = cat.files[key];

    var container = document.getElementById('reportContainer');
    if (!container) return;

    // Show loading
    container.innerHTML =
      '<div class="loading"><div class="spinner"></div><p>正在加载报告…</p></div>';

    fetch(cat.files[key])
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');

        // Build content: styles first, then body HTML
        var content = '';
        var styles = doc.querySelectorAll('style');
        styles.forEach(function(s) {
          content += s.outerHTML;
        });

        // Extract body content
        var bodyContent = doc.body.innerHTML;

        // Wrap in a shadow-host div
        container.innerHTML = '';

        // Use a scoped div - inject report CSS + body content
        // To avoid style bleeding, we prefix all the report CSS rules
        // Actually, let's use a Shadow DOM for clean isolation
        var shadow = container.attachShadow({mode: 'open'});

        var frag = document.createDocumentFragment();

        // Clone style nodes into shadow
        styles.forEach(function(s) {
          frag.appendChild(s.cloneNode(true));
        });

        // Parse body HTML nodes and append
        var temp = document.createElement('div');
        temp.innerHTML = bodyContent;
        while (temp.firstChild) {
          frag.appendChild(temp.firstChild);
        }

        shadow.appendChild(frag);
      })
      .catch(function(err) {
        container.innerHTML =
          '<div class="empty"><span class="icon" style="font-size:28px">&#x26A0;</span><p>加载失败：' + escapeHTML(err.message) + '</p></div>';
      });
  }

  function renderCategory(cat) {
    if (!cat || !cat.files) return;

    activeCat = cat.id;
    setActiveTab(cat.id);

    var keys = Object.keys(cat.files);
    if (keys.length === 0) {
      mainContent.innerHTML =
        '<div class="toolbar"></div>' +
        '<div class="report-container"><div class="empty"><span class="icon" style="font-size:28px">&#x25A1;</span><p>暂无报告</p></div></div>';
      return;
    }

    activeKey = keys[0];

    var html = showToolbar(cat, keys);
    html += '<div class="report-container" id="reportContainer"></div>';
    mainContent.innerHTML = html;

    // Bind events
    var sel = document.getElementById('reportSelect');
    sel.addEventListener('change', function() {
      renderReportContent(cat, this.value);
    });

    document.getElementById('navPrev').addEventListener('click', function() {
      var idx = sel.selectedIndex;
      if (idx > 0) {
        sel.selectedIndex = idx - 1;
        renderReportContent(cat, sel.value);
      }
    });

    document.getElementById('navNext').addEventListener('click', function() {
      var idx = sel.selectedIndex;
      if (idx < sel.options.length - 1) {
        sel.selectedIndex = idx + 1;
        renderReportContent(cat, sel.value);
      }
    });

    // Load first report
    renderReportContent(cat, activeKey);
  }

  function renderTabs(manifest) {
    var html = '';
    manifest.categories.forEach(function(cat, idx) {
      var short = CAT_NAMES_SHORT[cat.id] || cat.name;
      html += '<button class="tab' + (idx === 0 ? ' active' : '') + '" data-cat-id="' + cat.id + '" onclick="window.__loadCat(\'' + cat.id + '\')">';
      html += short;
      html += ' <span class="count">' + cat.reportCount + '</span>';
      html += '</button>';
    });
    tabsEl.innerHTML = html;
  }

  window.__loadCat = function(catId) {
    var cat = window.__MANIFEST.categories.find(function(c) { return c.id === catId; });
    if (cat) renderCategory(cat);
  };

  function render() {
    var m = window.__MANIFEST;
    if (!m || !m.categories || m.categories.length === 0) {
      mainContent.innerHTML =
        '<div class="report-container"><div class="empty"><span class="icon" style="font-size:28px">&#x26A0;</span><p>暂无报告数据</p></div></div>';
      return;
    }

    var totalReports = m.categories.reduce(function(s, c) { return s + c.reportCount; }, 0);
    navStats.textContent = m.categories.length + ' 分类 · ' + totalReports + ' 份报告';

    renderTabs(m);
    renderCategory(m.categories[0]);
  }

  window.renderHub = render;
})();
</script>

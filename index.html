<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Research Central · 投研报告库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:opsz,wght@14..32,400;14..32,500&family=Nunito:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-hover: #1c2128;
  --border: #21262d;
  --border-active: #30363d;
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --accent-light: rgba(88,166,255,0.1);
  --accent-text: #58a6ff;
  --red: #f85149;
  --green: #3fb950;
  --radius: 6px;
  --radius-lg: 10px;
  --font-serif: "Playfair Display", Georgia, "Times New Roman", serif;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-rounded: "Cabri", "Nunito", "Cabin", "Varela Round", -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Nav ── */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
}

.logo-mark svg {
  display: block;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-text .brand {
  font-family: var(--font-rounded);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.2px;
}

.logo-text .sub {
  font-size: 9.5px;
  color: var(--text-muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-top: 1px;
}

.nav-right {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

/* ── Hero ── */
.hero {
  padding: 44px 28px 0;
  max-width: 1100px;
  margin: 0 auto;
}

.hero h1 {
  font-family: var(--font-sans);
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}

.hero .quote {
  font-family: var(--font-rounded);
  font-size: 14px;
  font-style: italic;
  color: var(--text-secondary);
  max-width: 560px;
  line-height: 1.6;
  margin-bottom: 4px;
}

.hero .quote-author {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  margin-bottom: 0;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0 0;
}

/* ── Tabs ── */
.tabs-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 28px;
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.tab {
  padding: 14px 24px 12px;
  font-size: 14.5px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s;
  letter-spacing: 0.2px;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: var(--font-sans);
  position: relative;
}

.tab:hover {
  color: var(--text-secondary);
  border-bottom-color: var(--border-active);
}

.tab.active {
  color: var(--accent-text);
  border-bottom-color: var(--accent);
}

.tab .count {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 4px;
}

.tab.active .count {
  color: var(--accent);
}

/* ── Content ── */
.content {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 28px;
}

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.toolbar-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.8px;
}

.date-select {
  padding: 7px 32px 7px 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  min-width: 155px;
  font-family: var(--font-sans);
  letter-spacing: 0.3px;
  -webkit-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238b949e' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  transition: border-color 0.15s;
}

.date-select:focus {
  outline: none;
  border-color: var(--accent);
}

.btn {
  padding: 7px 14px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.3px;
  font-family: var(--font-sans);
  transition: border-color 0.15s, color 0.15s;
}

.btn:hover {
  border-color: var(--accent);
  color: var(--accent-text);
}

.btn-nav {
  padding: 7px 10px;
  font-size: 13px;
  line-height: 1;
}

/* ── Nav Buttons (报告库 / 深度追踪) ── */
.nav-btn {
  display: inline-flex;
  align-items: center;
  padding: 8px 20px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  letter-spacing: 0.3px;
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  background: var(--accent-light);
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  cursor: pointer;
}

.nav-btn:hover {
  background: rgba(88,166,255,0.18);
  border-color: var(--accent-hover);
  color: var(--accent-text);
}

/* Report container - full content */
.report-container {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: transparent;
  min-height: 400px;
}

.report-container > .loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  color: var(--text-muted);
  gap: 16px;
}

.report-container > .loading .spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.report-container > .loading p {
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* Empty state */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  color: var(--text-muted);
  gap: 12px;
}

/* Scoped report table overflow fix */
[id^="rpt-"] .rank-table {
  table-layout: fixed;
  width: 100%;
}
[id^="rpt-"] .rank-table td,
[id^="rpt-"] .rank-table th {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
[id^="rpt-"] .rank-table td:first-child {
  width: 28px;
}
[id^="rpt-"] .rank-table td:nth-child(3) {
  width: 85px;
}
[id^="rpt-"] .rank-table td:last-child {
  width: 80px;
  text-align: right;
}

/* Full-width scoped report content */
[id^="rpt-"] .container {
  max-width: 100%;
}

.empty .icon {
  opacity: 0.35;
}

.empty p {
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  padding: 28px 28px;
  max-width: 1100px;
  margin: 48px auto 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.footer-left {
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: 0.8px;
}

.footer-right {
  font-size: 10.5px;
  color: var(--text-muted);
}

/* Mobile */
@media (max-width: 768px) {
  .nav { padding: 0 16px; height: 52px; }
  .hero { padding: 32px 16px 0; }
  .hero h1 { font-size: 22px; }
  .tabs-wrap { padding: 0 16px; }
  .tab { padding: 12px 16px 10px; font-size: 13px; }
  .content { padding: 16px; }
  .toolbar { gap: 8px; }
  .report-container { min-height: 300px; }
  .footer { padding: 20px 16px; }
  .nav-right { display: none; }
  .nav-btn { padding: 6px 12px; font-size: 12.5px; }
}

@media (max-width: 480px) {
  .hero h1 { font-size: 19px; }
  .tab { padding: 10px 14px 8px; font-size: 12px; }
  .nav-btn { padding: 5px 10px; font-size: 11.5px; }
}

/* Report container */
.report-container .report-body {
  padding: 16px 20px;
}
</style>
</head>

<nav class="nav">

      </svg>

<section class="hero">

<div class="tabs-wrap" id="tabsWrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="content" id="mainContent">
  <div class="loading" id="initialLoading">
    <div class="spinner"></div>
    <p>正在加载报告库…</p>
  </div>
</div>

<footer class="footer">
  <div class="footer-left">My Research Central &copy; 2026</div>
  <div class="footer-right">Powered by Cleo &middot; Cloudflare Pages</div>
</footer>

<script>
(function() {
  'use strict';

  var CAT_NAMES_SHORT = {
    morning: '早间日报',
    evening: '晚间日报',
    national_team: '国家队',
    ai_bubble: 'AI 泡沫',
    ai_news: 'AI 新闻',
    deep_research: '深度研究',
    ai_tracking: '人物追踪',
    market_panorama: '市场全景'
  };

  var tabsEl = document.getElementById('tabs');
  var mainContent = document.getElementById('mainContent');
  var navStats = document.getElementById('navStats');
  var activeCat = null;
  var activeKey = null;

  function escapeHTML(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function setActiveTab(catId) {
    activeCat = catId;
    var allTabs = tabsEl.querySelectorAll('.tab');
    allTabs.forEach(function(t) {
      t.classList.toggle('active', t.dataset.catId === catId);
    });
  }

  function showLoading() {
    mainContent.innerHTML =
      '<div class="toolbar"></div>' +
      '<div class="report-container"><div class="loading"><div class="spinner"></div><p>正在加载报告…</p></div></div>';
  }

  function showToolbar(cat, keys) {
    if (keys.length === 0) return '<div class="toolbar"></div>';

    activeKey = keys[0];

    var html = '<div class="toolbar">';
    html += '<span class="toolbar-label">选择</span>';
    html += '<select class="date-select" id="reportSelect">';
    keys.forEach(function(k) {
      html += '<option value="' + escapeHTML(k) + '"' + (k === activeKey ? ' selected' : '') + '>' + escapeHTML(k) + '</option>';
    });
    html += '</select>';
    html += '<button class="btn btn-nav" id="navPrev" title="上一条">&#x25C0;</button>';
    html += '<button class="btn btn-nav" id="navNext" title="下一条">&#x25B6;</button>';
    html += '<span style="flex:1"></span>';
    html += '<a class="btn" id="openLink" href="' + escapeHTML(cat.files[activeKey]) + '" target="_blank">新窗口打开 ↗</a>';
    html += '</div>';

    return html;
  }

  function scopeCSS(css, prefix) {
    // Prefix all CSS selectors with the container prefix to prevent style bleeding
    return css.replace(/([^{}]+)\s*\{/g, function(match, selectors) {
      var sel = selectors.trim();
      if (sel.startsWith('@')) return match;
      var scoped = sel.split(',').map(function(s) {
        s = s.trim();
        if (s === ':root' || s === 'body') return prefix;
        s = s.replace(/\bhtml\b/g, prefix);
        s = s.replace(/\bbody\b/g, prefix);
        // Only prefix element/class/id/pseudo selectors - not already-prefixed
        if (/^[a-zA-Z*.#:]/.test(s)) {
          return prefix + ' ' + s;
        }
        return s;
      }).join(', ');
      return scoped + ' {';
    });
  }

  function executeScripts(container) {
    // Re-create script elements so the browser executes them.
    // Handle external scripts sequentially (wait for load) to preserve dependency order.
    var scripts = Array.from(container.querySelectorAll('script'));

    function execNext(idx) {
      if (idx >= scripts.length) return;
      var oldScript = scripts[idx];
      if (oldScript.getAttribute('data-executed')) {
        execNext(idx + 1);
        return;
      }

      var newScript = document.createElement('script');
      newScript.textContent = oldScript.textContent;
      if (oldScript.src) newScript.src = oldScript.src;
      if (oldScript.type) newScript.type = oldScript.type;
      newScript.setAttribute('data-executed', '1');

      // For external scripts, wait for load before next
      if (oldScript.src) {
        newScript.onload = function() { execNext(idx + 1); };
        newScript.onerror = function() { execNext(idx + 1); };
      }

      oldScript.parentNode.replaceChild(newScript, oldScript);

      // Inline scripts execute synchronously; proceed immediately
      if (!oldScript.src) execNext(idx + 1);
    }

    execNext(0);
  }

  function renderReportContent(cat, key) {
    activeKey = key;
    var sel = document.getElementById('reportSelect');
    if (sel) sel.value = key;

    var link = document.getElementById('openLink');
    if (link) link.href = cat.files[key];

    var container = document.getElementById('reportContainer');
    if (!container) return;

    // If container has a shadow root from a previous render,
    // replace the element entirely to start fresh
    if (container.shadowRoot) {
      var newContainer = document.createElement('div');
      newContainer.id = 'reportContainer';
      newContainer.className = container.className;
      container.parentNode.replaceChild(newContainer, container);
      container = newContainer;
    }

    // Show loading
    container.innerHTML =
      '<div class="loading"><div class="spinner"></div><p>正在加载报告…</p></div>';

    fetch(cat.files[key])
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var styles = doc.querySelectorAll('style');
        var scripts = doc.querySelectorAll('script');
        var bodyContent = doc.body.innerHTML;

        // Use div + CSS scoping for all reports
        // (uniform approach avoids Shadow DOM switching issues)
        container.innerHTML = '';
        var reportId = 'rpt-' + Math.random().toString(36).slice(2, 8);
        var wrapper = document.createElement('div');
        wrapper.id = reportId;

        // Inject scoped CSS
        styles.forEach(function(s) {
          if (!s.textContent.trim()) return;
          var scoped = scopeCSS(s.textContent, '#' + reportId);
          var style = document.createElement('style');
          style.textContent = scoped;
          wrapper.appendChild(style);
        });

        // Inject body content
        var temp = document.createElement('div');
        temp.innerHTML = bodyContent;
        while (temp.firstChild) {
          wrapper.appendChild(temp.firstChild);
        }

        container.appendChild(wrapper);

        // Execute scripts after content is in the DOM
        if (scripts.length > 0) {
          setTimeout(function() {
            executeScripts(wrapper);
          }, 50);
        }
      })
      .catch(function(err) {
        container.innerHTML =
          '<div class="empty"><span class="icon" style="font-size:28px">&#x26A0;</span><p>加载失败：' + escapeHTML(err.message) + '</p></div>';
      });
  }

  function renderCategory(cat) {
    if (!cat || !cat.files) return;

    activeCat = cat.id;
    setActiveTab(cat.id);

    var keys = Object.keys(cat.files);
    if (keys.length === 0) {
      mainContent.innerHTML =
        '<div class="toolbar"></div>' +
        '<div class="report-container"><div class="empty"><span class="icon" style="font-size:28px">&#x25A1;</span><p>暂无报告</p></div></div>';
      return;
    }

    activeKey = keys[0];

    var html = showToolbar(cat, keys);
    html += '<div class="report-container" id="reportContainer"></div>';
    mainContent.innerHTML = html;

    // Bind events
    var sel = document.getElementById('reportSelect');
    sel.addEventListener('change', function() {
      renderReportContent(cat, this.value);
    });

    document.getElementById('navPrev').addEventListener('click', function() {
      var idx = sel.selectedIndex;
      if (idx > 0) {
        sel.selectedIndex = idx - 1;
        renderReportContent(cat, sel.value);
      }
    });

    document.getElementById('navNext').addEventListener('click', function() {
      var idx = sel.selectedIndex;
      if (idx < sel.options.length - 1) {
        sel.selectedIndex = idx + 1;
        renderReportContent(cat, sel.value);
      }
    });

    // Load first report
    renderReportContent(cat, activeKey);
  }

  function renderTabs(manifest) {
    var html = '';
    manifest.categories.forEach(function(cat, idx) {
      var short = CAT_NAMES_SHORT[cat.id] || cat.name;
      html += '<button class="tab' + (idx === 0 ? ' active' : '') + '" data-cat-id="' + cat.id + '" onclick="window.__loadCat(\'' + cat.id + '\')">';
      html += short;
      html += ' <span class="count">' + cat.reportCount + '</span>';
      html += '</button>';
    });
    tabsEl.innerHTML = html;
  }

  window.__loadCat = function(catId) {
    var cat = window.__MANIFEST.categories.find(function(c) { return c.id === catId; });
    if (cat) renderCategory(cat);
  };

  function render() {
    var m = window.__MANIFEST;
    if (!m || !m.categories || m.categories.length === 0) {
      mainContent.innerHTML =
        '<div class="report-container"><div class="empty"><span class="icon" style="font-size:28px">&#x26A0;</span><p>暂无报告数据</p></div></div>';
      return;
    }

    var totalReports = m.categories.reduce(function(s, c) { return s + c.reportCount; }, 0);
    navStats.textContent = m.categories.length + ' 分类 · ' + totalReports + ' 份报告';

    renderTabs(m);
    renderCategory(m.categories[0]);
  }

  window.renderHub = render;
})();
</script>
